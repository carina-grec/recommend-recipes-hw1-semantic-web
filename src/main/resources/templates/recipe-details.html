<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Recipe Details</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <meta charset="UTF-8">
</head>
<body>

<div class="navbar">
    <a th:href="@{/}">Home</a>
    <a th:href="@{/recipes/add}">Add Recipe</a>
    <a th:href="@{/users/add}">Add User</a>
    <a th:href="@{/recommend/skill}">Recommend by Skill</a>
    <a th:href="@{/recommend/skill-cuisine}">Recommend by Skill + Cuisine</a>
    <a th:href="@{/recipes/filter}">Filter by Cuisine</a>
    <a th:href="@{/recipes/xsl}">Display with XSL</a>
    <a th:href="@{/recipes/scrape}">Scrape BBC Recipes</a>
</div>

<div class="container">
    <h1>Recipe Details</h1>

    <div th:if="${error}" class="error-message">
        <p th:text="${error}"></p>
    </div>

    <div class="card" th:if="${recipe != null}">
        <p><strong>ID:</strong> <span th:text="${recipe.id}"></span></p>
        <p><strong>Title:</strong> <span th:text="${recipe.title}"></span></p>
        <p>
            <strong>Cuisine Types:</strong>
            <span th:each="cuisine, iterStat : ${recipe.cuisineTypes}">
                <span th:text="${cuisine}"></span><span th:if="${!iterStat.last}">, </span>
            </span>
        </p>
        <p><strong>Difficulty:</strong> <span th:text="${recipe.difficulty}"></span></p>
    </div>
</div>

</body>
</html>
