<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Filter Recipes by Cuisine</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <meta charset="UTF-8">
</head>
<body>

<div class="navbar">
    <a th:href="@{/}">Home</a>
    <a th:href="@{/recipes/add}">Add Recipe</a>
    <a th:href="@{/users/add}">Add User</a>
    <a th:href="@{/recommend/skill}">Recommend by Skill</a>
    <a th:href="@{/recommend/skill-cuisine}">Recommend by Skill + Cuisine</a>
    <a th:href="@{/recipes/filter}">Filter by Cuisine</a>
    <a th:href="@{/recipes/xsl}">Display with XSL</a>
    <a th:href="@{/recipes/scrape}">Scrape BBC Recipes</a>
</div>

<div class="container">
    <h1>Filter Recipes by Cuisine</h1>

    <form th:action="@{/recipes/filter}" method="get">
        <div>
            <label for="cuisine">Select cuisine type:</label>
            <select id="cuisine" name="cuisine">
                <option value="">-- Select --</option>
                <option th:each="c : ${cuisineOptions}"
                        th:value="${c}"
                        th:text="${c}"
                        th:selected="${c == selectedCuisine}">
                </option>
            </select>
        </div>
        <button type="submit">Filter</button>
    </form>

    <table th:if="${recipes != null}">
        <thead>
        <tr>
            <th>ID</th>
            <th>Title</th>
            <th>Cuisine Types</th>
            <th>Difficulty</th>
            <th>Details</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="recipe : ${recipes}">
            <td th:text="${recipe.id}"></td>
            <td th:text="${recipe.title}"></td>
            <td>
                <span th:each="cuisine, iterStat : ${recipe.cuisineTypes}">
                    <span th:text="${cuisine}"></span><span th:if="${!iterStat.last}">, </span>
                </span>
            </td>
            <td th:text="${recipe.difficulty}"></td>
            <td>
                <a th:href="@{'/recipes/' + ${recipe.id}}">View</a>
            </td>
        </tr>
        </tbody>
    </table>

    <div th:if="${recipes != null and recipes.isEmpty()}" class="card">
        <p>No recipes found for this cuisine.</p>
    </div>
</div>

</body>
</html>
