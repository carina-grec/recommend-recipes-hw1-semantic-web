<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Add User</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <meta charset="UTF-8">
</head>
<body>

<div class="navbar">
    <a th:href="@{/}">Home</a>
    <a th:href="@{/recipes/add}">Add Recipe</a>
    <a th:href="@{/users/add}">Add User</a>
    <a th:href="@{/recommend/skill}">Recommend by Skill</a>
    <a th:href="@{/recommend/skill-cuisine}">Recommend by Skill + Cuisine</a>
    <a th:href="@{/recipes/filter}">Filter by Cuisine</a>
    <a th:href="@{/recipes/xsl}">Display with XSL</a>
    <a th:href="@{/recipes/scrape}">Scrape BBC Recipes</a>
</div>

<div class="container">
    <h1>Add User</h1>

    <div th:if="${error}" class="error-message">
        <p th:text="${error}"></p>
    </div>

    <form th:action="@{/users/add}" th:object="${userForm}" method="post">
        <div>
            <label for="name">Name:</label>
            <input id="name" type="text" th:field="*{name}" required>
        </div>

        <div>
            <label for="surname">Surname:</label>
            <input id="surname" type="text" th:field="*{surname}" required>
        </div>

        <div>
            <label for="skill">Cooking Skill Level:</label>
            <select id="skill" th:field="*{cookingSkillLevel}">
                <option value="">-- Select --</option>
                <option th:each="d : ${difficultyOptions}" th:value="${d}" th:text="${d}"></option>
            </select>
        </div>

        <div>
            <label for="preferredCuisine">Preferred Cuisine Type:</label>
            <select id="preferredCuisine" th:field="*{preferredCuisineType}">
                <option value="">-- Select --</option>
                <option th:each="c : ${cuisineOptions}" th:value="${c}" th:text="${c}"></option>
            </select>
        </div>

        <button type="submit">Save User</button>
    </form>
</div>

</body>
</html>
