<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Recommendations by Skill</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <meta charset="UTF-8">
</head>
<body>

<div class="navbar">
    <a th:href="@{/}">Home</a>
    <a th:href="@{/recipes/add}">Add Recipe</a>
    <a th:href="@{/users/add}">Add User</a>
    <a th:href="@{/recommend/skill}">Recommend by Skill</a>
    <a th:href="@{/recommend/skill-cuisine}">Recommend by Skill + Cuisine</a>
    <a th:href="@{/recipes/filter}">Filter by Cuisine</a>
    <a th:href="@{/recipes/xsl}">Display with XSL</a>
    <a th:href="@{/recipes/scrape}">Scrape BBC Recipes</a>
</div>

<div class="container">
    <h1>Recommendations by Cooking Skill</h1>

    <div th:if="${error}" class="error-message">
        <p th:text="${error}"></p>
    </div>

    <form th:action="@{/recommend/skill}" method="get">
        <div>
            <label for="userId">Select user:</label>
            <select id="userId" name="userId">
                <option value="">-- First User --</option>
                <option th:each="u : ${users}"
                        th:value="${u.id}"
                        th:text="${u.fullName + ' (' + u.cookingSkillLevel + ')'}"
                        th:selected="${u.id == selectedUserId}">
                </option>
            </select>
        </div>
        <button type="submit">Get Recommendations</button>
    </form>

    <div class="card" th:if="${user != null}">
        <p>
            Recommendations for
            <strong th:text="${user.fullName}"></strong>
        </p>
        <p>
            Skill level:
            <strong th:text="${user.cookingSkillLevel}"></strong>
        </p>
    </div>

    <table th:if="${recipes != null and !recipes.isEmpty()}">
        <thead>
        <tr>
            <th>ID</th>
            <th>Title</th>
            <th>Cuisine Types</th>
            <th>Difficulty</th>
            <th>Details</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="recipe : ${recipes}">
            <td th:text="${recipe.id}"></td>
            <td th:text="${recipe.title}"></td>
            <td>
                <span th:each="cuisine, iterStat : ${recipe.cuisineTypes}">
                    <span th:text="${cuisine}"></span><span th:if="${!iterStat.last}">, </span>
                </span>
            </td>
            <td th:text="${recipe.difficulty}"></td>
            <td>
                <a th:href="@{'/recipes/' + ${recipe.id}}">View</a>
            </td>
        </tr>
        </tbody>
    </table>

    <div th:if="${recipes != null and recipes.isEmpty()}" class="card">
        <p>No matching recipes found.</p>
    </div>
</div>

</body>
</html>
